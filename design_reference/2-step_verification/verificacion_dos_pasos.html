<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<style>

        .no-scrollbar::-webkit-scrollbar {

        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */

        input[type=number]::-webkit-inner-spin-button,

            margin: 0; 
        }

        }

    body {

<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col antialiased selection:bg-primary/30 selection:text-primary">
<div class="relative flex h-full w-full flex-col grow overflow-x-hidden">
<!-- Top Navigation -->
<header class="flex items-center px-4 py-4 justify-between sticky top-0 z-20 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md">
<button aria-label="Go back" class="text-slate-900 dark:text-white flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_back_ios_new</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">2-Step Verification</h2>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col items-center justify-center w-full max-w-md mx-auto px-6 pb-6">
<!-- Hero Illustration -->
<div class="w-full flex justify-center mb-8 relative">
<!-- Abstract Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-32 bg-primary/20 rounded-full blur-3xl"></div>
<!-- Icon Container -->
<div class="relative w-32 h-32 flex items-center justify-center rounded-full bg-gradient-to-br from-slate-200 to-slate-100 dark:from-slate-800 dark:to-background-dark shadow-xl border border-white/50 dark:border-white/10">
<div class="w-full h-full rounded-full bg-center bg-no-repeat bg-[length:60%] opacity-90" data-alt="Illustration of a secure shield lock representing safety" style='background-image: url("imagenes/verificacion_dos_pasos_imagen_1.jpg");'>
</div>
</div>
</div>
<!-- Headlines -->
<div class="w-full text-center space-y-3 mb-10">
<h1 class="text-slate-900 dark:text-white tracking-tight text-3xl font-extrabold leading-tight">Verification Code</h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal leading-relaxed max-w-xs mx-auto">
                    Enter the code we just sent to your phone number ending in <span class="text-slate-900 dark:text-white font-bold">99</span>.
                </p>
</div>
<!-- Code Input Form -->
<div class="w-full mb-10">
<fieldset class="relative flex gap-2 sm:gap-3 justify-center">
<!-- Javascript logic inline as requested to simulate functionality without external scripts -->
<input autocomplete="one-time-code" autofocus="" class="flex h-14 w-12 sm:h-16 sm:w-14 text-center rounded-lg bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white text-2xl font-bold placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm" inputmode="numeric" maxlength="1" oninput="javascript:if(this.value.length&gt;1)this.value=this.value.slice(0,1); if(this.value.length==1 &amp;&amp; this.nextElementSibling) this.nextElementSibling.focus();" onkeydown="javascript:(event.key=='Backspace'&amp;&amp;this.value==''&amp;&amp;this.previousElementSibling&amp;&amp;(this.previousElementSibling.focus()))||(event.key=='ArrowLeft'&amp;&amp;this.previousElementSibling&amp;&amp;this.previousElementSibling.focus())||(event.key=='ArrowRight'&amp;&amp;this.nextElementSibling&amp;&amp;this.nextElementSibling.focus());" type="number"/>
<input class="flex h-14 w-12 sm:h-16 sm:w-14 text-center rounded-lg bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white text-2xl font-bold placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm" inputmode="numeric" maxlength="1" oninput="javascript:if(this.value.length&gt;1)this.value=this.value.slice(0,1); if(this.value.length==1 &amp;&amp; this.nextElementSibling) this.nextElementSibling.focus();" onkeydown="javascript:(event.key=='Backspace'&amp;&amp;this.value==''&amp;&amp;this.previousElementSibling&amp;&amp;(this.previousElementSibling.value='',this.previousElementSibling.focus()))||(event.key=='ArrowLeft'&amp;&amp;this.previousElementSibling&amp;&amp;this.previousElementSibling.focus())||(event.key=='ArrowRight'&amp;&amp;this.nextElementSibling&amp;&amp;this.nextElementSibling.focus());" type="number"/>
<input class="flex h-14 w-12 sm:h-16 sm:w-14 text-center rounded-lg bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white text-2xl font-bold placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm" inputmode="numeric" maxlength="1" oninput="javascript:if(this.value.length&gt;1)this.value=this.value.slice(0,1); if(this.value.length==1 &amp;&amp; this.nextElementSibling) this.nextElementSibling.focus();" onkeydown="javascript:(event.key=='Backspace'&amp;&amp;this.value==''&amp;&amp;this.previousElementSibling&amp;&amp;(this.previousElementSibling.value='',this.previousElementSibling.focus()))||(event.key=='ArrowLeft'&amp;&amp;this.previousElementSibling&amp;&amp;this.previousElementSibling.focus())||(event.key=='ArrowRight'&amp;&amp;this.nextElementSibling&amp;&amp;this.nextElementSibling.focus());" type="number"/>
<input class="flex h-14 w-12 sm:h-16 sm:w-14 text-center rounded-lg bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white text-2xl font-bold placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm" inputmode="numeric" maxlength="1" oninput="javascript:if(this.value.length&gt;1)this.value=this.value.slice(0,1); if(this.value.length==1 &amp;&amp; this.nextElementSibling) this.nextElementSibling.focus();" onkeydown="javascript:(event.key=='Backspace'&amp;&amp;this.value==''&amp;&amp;this.previousElementSibling&amp;&amp;(this.previousElementSibling.value='',this.previousElementSibling.focus()))||(event.key=='ArrowLeft'&amp;&amp;this.previousElementSibling&amp;&amp;this.previousElementSibling.focus())||(event.key=='ArrowRight'&amp;&amp;this.nextElementSibling&amp;&amp;this.nextElementSibling.focus());" type="number"/>
<input class="flex h-14 w-12 sm:h-16 sm:w-14 text-center rounded-lg bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white text-2xl font-bold placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm" inputmode="numeric" maxlength="1" oninput="javascript:if(this.value.length&gt;1)this.value=this.value.slice(0,1); if(this.value.length==1 &amp;&amp; this.nextElementSibling) this.nextElementSibling.focus();" onkeydown="javascript:(event.key=='Backspace'&amp;&amp;this.value==''&amp;&amp;this.previousElementSibling&amp;&amp;(this.previousElementSibling.value='',this.previousElementSibling.focus()))||(event.key=='ArrowLeft'&amp;&amp;this.previousElementSibling&amp;&amp;this.previousElementSibling.focus())||(event.key=='ArrowRight'&amp;&amp;this.nextElementSibling&amp;&amp;this.nextElementSibling.focus());" type="number"/>
<input class="flex h-14 w-12 sm:h-16 sm:w-14 text-center rounded-lg bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white text-2xl font-bold placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm" inputmode="numeric" maxlength="1" oninput="javascript:if(this.value.length&gt;1)this.value=this.value.slice(0,1); if(this.value.length==1) this.blur();" onkeydown="javascript:(event.key=='Backspace'&amp;&amp;this.value==''&amp;&amp;this.previousElementSibling&amp;&amp;(this.previousElementSibling.value='',this.previousElementSibling.focus()))||(event.key=='ArrowLeft'&amp;&amp;this.previousElementSibling&amp;&amp;this.previousElementSibling.focus())||(event.key=='ArrowRight'&amp;&amp;this.nextElementSibling&amp;&amp;this.nextElementSibling.focus());" type="number"/>
</fieldset>
</div>
<!-- Actions -->
<div class="w-full space-y-6">
<button class="w-full bg-primary hover:bg-blue-600 active:bg-blue-700 text-white text-lg font-bold py-4 rounded-xl shadow-lg shadow-primary/25 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">verified_user</span>
                    Verify
                </button>
<div class="flex flex-col items-center justify-center gap-1">
<span class="text-slate-500 dark:text-slate-400 text-sm font-medium">Didn't receive the code?</span>
<button class="group flex items-center gap-1.5 px-3 py-1.5 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed transition-colors" disabled="">
<span class="material-symbols-outlined text-primary text-[18px] animate-pulse">timer</span>
<span class="text-primary font-bold text-sm">Resend code in 00:30</span>
</button>
</div>
</div>
</main>
<!-- Bottom spacing for iOS Home Indicator -->
<div class="h-6 w-full shrink-0"></div>
</div>
</body></html>
