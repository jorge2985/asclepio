<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Selección de Método de Pago</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts: Manrope -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#135bec",
              "background-light": "#f6f6f8",
              "background-dark": "#101622",
              "surface-light": "#ffffff",
              "surface-dark": "#1a2233",
            },
            fontFamily: {
              "display": ["Manrope", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            boxShadow: {
              'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar hide for clean mobile look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#0d121b] dark:text-white transition-colors duration-300">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden pb-32 max-w-md mx-auto bg-background-light dark:bg-background-dark shadow-2xl">
<!-- TopAppBar -->
<div class="sticky top-0 z-20 flex items-center bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-sm p-4 pb-2 justify-between border-b border-transparent dark:border-white/5 transition-all">
<div class="text-[#0d121b] dark:text-white flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/10 cursor-pointer transition-colors">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</div>
<h2 class="text-[#0d121b] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Método de Pago</h2>
</div>
<!-- Order Summary Section -->
<div class="mt-2">
<h3 class="text-[#0d121b] dark:text-white tracking-tight text-xl font-bold leading-tight px-6 text-left pb-4 pt-4">Resumen del pedido</h3>
<!-- Summary Card -->
<div class="px-6">
<div class="flex flex-col gap-4 bg-surface-light dark:bg-surface-dark px-5 py-5 rounded-2xl shadow-soft border border-gray-100 dark:border-gray-800">
<div class="flex items-start gap-4">
<div class="relative">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-xl h-[60px] w-[60px] object-cover shadow-sm" data-alt="Doctor portrait with friendly smile" style='background-image: url("imagenes/seleccion_metodo_pago_imagen_1.jpg");'>
</div>
<div class="absolute -bottom-1 -right-1 bg-green-500 h-3 w-3 rounded-full border-2 border-white dark:border-surface-dark"></div>
</div>
<div class="flex flex-1 flex-col justify-center">
<div class="flex justify-between items-start">
<div>
<p class="text-[#0d121b] dark:text-white text-lg font-bold leading-tight">Dr. Ana García</p>
<p class="text-[#4c669a] dark:text-gray-400 text-sm font-medium leading-normal mt-0.5">Cardiología</p>
</div>
<span class="bg-blue-50 dark:bg-blue-900/30 text-primary dark:text-blue-300 text-xs font-bold px-2 py-1 rounded-md">Video</span>
</div>
<div class="mt-3 pt-3 border-t border-gray-100 dark:border-gray-700 flex justify-between items-center">
<p class="text-sm text-gray-500 dark:text-gray-400 font-medium">Total a pagar</p>
<p class="text-[#0d121b] dark:text-white text-lg font-extrabold leading-normal tracking-tight">$50.00</p>
</div>
</div>
</div>
</div>
</div>
</div>
<!-- Payment Method Section -->
<div class="mt-2">
<h3 class="text-[#0d121b] dark:text-white tracking-tight text-xl font-bold leading-tight px-6 text-left pb-4 pt-6">Selecciona un método</h3>
<div class="px-4 space-y-3">
<!-- Option 1: Card (Selected) -->
<label class="group relative flex items-center justify-between gap-4 rounded-xl border-2 border-primary bg-primary/5 dark:bg-primary/10 px-4 py-4 cursor-pointer transition-all duration-200">
<div class="flex items-center gap-4">
<div class="flex h-10 w-14 shrink-0 items-center justify-center rounded-lg bg-white dark:bg-surface-dark shadow-sm border border-gray-100 dark:border-gray-700 text-gray-800 dark:text-white">
<span class="material-symbols-outlined">credit_card</span>
</div>
<div class="flex flex-col">
<p class="text-[#0d121b] dark:text-white text-base font-bold leading-normal">Tarjeta de Crédito</p>
<p class="text-xs text-primary dark:text-blue-300 font-medium">Visa terminada en 4242</p>
</div>
</div>
<div class="shrink-0 text-primary">
<span class="material-symbols-outlined filled text-2xl">radio_button_checked</span>
</div>
<input checked="" class="sr-only" name="payment" type="radio"/>
</label>
<!-- Option 2: Apple Pay -->
<label class="group relative flex items-center justify-between gap-4 rounded-xl border border-transparent bg-surface-light dark:bg-surface-dark px-4 py-4 cursor-pointer shadow-sm hover:shadow-md transition-all duration-200">
<div class="flex items-center gap-4">
<div class="flex h-10 w-14 shrink-0 items-center justify-center rounded-lg bg-black text-white shadow-sm">
<span class="material-symbols-outlined text-xl">phone_iphone</span>
</div>
<div class="flex flex-col">
<p class="text-[#0d121b] dark:text-white text-base font-semibold leading-normal">Apple Pay</p>
</div>
</div>
<div class="shrink-0 text-gray-300 dark:text-gray-600 group-hover:text-primary/50 transition-colors">
<span class="material-symbols-outlined text-2xl">radio_button_unchecked</span>
</div>
<input class="sr-only" name="payment" type="radio"/>
</label>
<!-- Option 3: Google Pay -->
<label class="group relative flex items-center justify-between gap-4 rounded-xl border border-transparent bg-surface-light dark:bg-surface-dark px-4 py-4 cursor-pointer shadow-sm hover:shadow-md transition-all duration-200">
<div class="flex items-center gap-4">
<div class="flex h-10 w-14 shrink-0 items-center justify-center rounded-lg bg-white border border-gray-200 text-gray-800 shadow-sm">
<span class="font-bold text-sm tracking-tight text-gray-600">GPay</span>
</div>
<div class="flex flex-col">
<p class="text-[#0d121b] dark:text-white text-base font-semibold leading-normal">Google Pay</p>
</div>
</div>
<div class="shrink-0 text-gray-300 dark:text-gray-600 group-hover:text-primary/50 transition-colors">
<span class="material-symbols-outlined text-2xl">radio_button_unchecked</span>
</div>
<input class="sr-only" name="payment" type="radio"/>
</label>
<!-- Option 4: Bank Transfer -->
<label class="group relative flex items-center justify-between gap-4 rounded-xl border border-transparent bg-surface-light dark:bg-surface-dark px-4 py-4 cursor-pointer shadow-sm hover:shadow-md transition-all duration-200">
<div class="flex items-center gap-4">
<div class="flex h-10 w-14 shrink-0 items-center justify-center rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-300 shadow-sm">
<span class="material-symbols-outlined text-xl">account_balance</span>
</div>
<div class="flex flex-col">
<p class="text-[#0d121b] dark:text-white text-base font-semibold leading-normal">Transferencia</p>
</div>
</div>
<div class="shrink-0 text-gray-300 dark:text-gray-600 group-hover:text-primary/50 transition-colors">
<span class="material-symbols-outlined text-2xl">radio_button_unchecked</span>
</div>
<input class="sr-only" name="payment" type="radio"/>
</label>
</div>
<!-- Security Badge inline -->
<div class="flex items-center justify-center gap-2 mt-6 mb-2 opacity-60">
<span class="material-symbols-outlined text-lg text-gray-500 dark:text-gray-400">lock</span>
<span class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Pago Seguro SSL</span>
</div>
</div>
<!-- Sticky Footer -->
<div class="fixed bottom-0 left-0 w-full z-30 max-w-md mx-auto right-0 px-6 pb-8 pt-4 bg-white/90 dark:bg-surface-dark/95 backdrop-blur-md border-t border-gray-100 dark:border-white/5">
<button class="group w-full bg-primary hover:bg-blue-700 active:scale-[0.98] transition-all duration-200 text-white rounded-xl py-4 px-6 shadow-lg shadow-primary/30 flex items-center justify-between">
<span class="text-base font-bold">Proceder al Pago</span>
<div class="flex items-center gap-2">
<span class="bg-white/20 px-2 py-0.5 rounded text-sm font-semibold group-hover:bg-white/30 transition-colors">$50.00</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</div>
</button>
</div>
</div>
